<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Halo AI Builder</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: black;
      color: #00ffd5;
      text-align: center;
    }

    input {
      width: 60%;
      padding: 15px;
      margin-top: 20px;
      background: transparent;
      border: 2px solid #00ffd5;
      color: #00ffd5;
    }

    button {
      padding: 15px;
      background: #00ffd5;
      border: none;
      cursor: pointer;
    }

    iframe {
      width: 90%;
      height: 400px;
      margin-top: 20px;
      border: 2px solid #00ffd5;
      background: white;
    }

    pre {
      text-align: left;
      width: 90%;
      margin: auto;
      margin-top: 20px;
      background: #111;
      padding: 10px;
      overflow: auto;
    }
  </style>
</head>

<body>

<h1>🚀 HALO AI APP BUILDER</h1>

<input id="prompt" placeholder="Tee sovellus...">
<button onclick="build()">Build</button>

<iframe id="preview"></iframe>

<pre id="code"></pre>

<script>
async function build() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch("/api/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: prompt })
  });

  const data = await res.json();

  document.getElementById("code").innerText = data.reply;

  // 🔥 parse code
  const html = data.reply.split("---HTML---")[1]?.split("---CSS---")[0] || "";
  const css = data.reply.split("---CSS---")[1]?.split("---JS---")[0] || "";
  const js = data.reply.split("---JS---")[1] || "";

  const final = `
    <style>${css}</style>
    ${html}
    <script>${js}<\/script>
  `;

  document.getElementById("preview").srcdoc = final;
}
</script>

</body>
</html>
