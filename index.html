<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halo Builder V2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot">✦</span>
        <span>Halo Builder V2</span>
      </div>
      <div class="topbar-right">
        <span id="statusPill" class="pill">Ready</span>
        <div class="avatar">M</div>
      </div>
    </header>

    <main class="layout">
      <aside class="left-pane">
        <section class="hero-card">
          <h1>Rakennetaan jotain, Miro</h1>
          <p>Kirjoita idea ja AI tekee siitä oikean appin.</p>

          <div class="prompt-row">
            <input id="promptInput" placeholder="Tee todo app, jossa voi poistaa tehtäviä..." />
            <button id="buildBtn">Build</button>
          </div>

          <div class="quick-row">
            <button class="ghost" data-fill="Tee moderni task app, jossa voi lisätä, poistaa ja merkitä valmiiksi tehtäviä.">Task app</button>
            <button class="ghost" data-fill="Tee notes app, jossa voi kirjoittaa muistiinpanoja ja tallentaa ne selaimeen.">Notes app</button>
            <button class="ghost" data-fill="Tee dashboard-app, jossa on kortteja, tilastoja ja tumma futuristinen ulkoasu.">Dashboard</button>
          </div>
        </section>

        <section class="projects-card">
          <div class="section-head">
            <h2>Projektit</h2>
            <button id="clearProjectsBtn" class="small">Tyhjennä</button>
          </div>
          <div id="projectBoard" class="project-board"></div>
        </section>
      </aside>

      <section class="right-pane">
        <div class="preview-card">
          <div class="section-head">
            <h2 id="previewTitle">Preview</h2>
            <div class="preview-actions">
              <button id="previewTabBtn" class="tab active">Preview</button>
              <button id="codeTabBtn" class="tab">Code</button>
              <button id="copyBtn" class="small">Copy</button>
            </div>
          </div>

          <div id="previewWrap" class="preview-wrap">
            <iframe id="previewFrame" title="App preview"></iframe>
          </div>

          <pre id="codeView" class="code-view hidden"></pre>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
